<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
      font-family: Poppins, sans-serif;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 15px;

      background: radial-gradient(circle at top left, #0f172a, #020617);
      overflow: hidden;
    }
    body::before,
    body::after {
      content: "";
      position: absolute;
      width: 320px;
      height: 320px;
      filter: blur(120px);
      z-index: 0;
    }

    body::before {
      background: #6366f1;
      top: -80px;
      left: -80px;
    }

    body::after {
      background: #06b6d4;
      bottom: -80px;
      right: -80px;
    }

    .container {
      position: relative;
      z-index: 1;

      width: 100%;
      max-width: 400px;

      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(25px);

      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 22px;

      padding: 35px;

      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5);
      animation: fade 0.7s ease;
    }

    @keyframes fade {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    h2 {
      text-align: center;
      margin-bottom: 25px;
      font-size: 28px;

      background: linear-gradient(to right, #60a5fa, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    input {
      width: 100%;
      padding: 14px;
      margin: 10px 0;

      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.12);

      background: rgba(255, 255, 255, 0.08);
      color: white;

      outline: none;
      transition: 0.3s;
    }

    input::placeholder {
      color: rgba(255, 255, 255, 0.6);
    }

    input:focus {
      border-color: #60a5fa;
      box-shadow: 0 0 0 3px rgba(96, 165, 250, 0.2);
      transform: scale(1.02);
    }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 12px;

      border: none;
      border-radius: 12px;

      background: linear-gradient(135deg, #3b82f6, #8b5cf6);

      color: white;
      font-weight: 600;
      cursor: pointer;

      transition: 0.25s;
    }

    button:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 25px rgba(0, 0, 0, 0.3);
    }

    button:active {
      transform: scale(0.97);
    }

    .status {
      margin-top: 15px;
      padding: 10px;
      border-radius: 10px;
      text-align: center;
      display: none;
      font-size: 14px;
    }

    .success {
      background: rgba(34, 197, 94, 0.2);
      border: 1px solid #22c55e;
      color: #22c55e;
    }

    .error {
      background: rgba(239, 68, 68, 0.2);
      border: 1px solid #ef4444;
      color: #ef4444;
    }

    .loader {
      display: none;
      margin: 15px auto 0;
      width: 28px;
      height: 28px;
      border: 3px solid rgba(255, 255, 255, 0.2);
      border-top: 3px solid white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .link {
      text-align: center;
      margin-top: 15px;
      color: rgba(255, 255, 255, 0.8);
    }

    .link span {
      color: white;
      font-weight: 600;
      cursor: pointer;
    }

    .password-wrapper {
      position: relative;
    }

    .toggle-eye {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
    }
  </style>
</head>

<body>

  <div class="container">

    <h2>RT-Interview Login</h2>

    <input id="email" placeholder="Email">

    <div class="password-wrapper">
      <input id="password" type="password" placeholder="Password">
      <span class="toggle-eye" onclick="togglePassword('password', this)">👁️</span>
    </div>

    <button onclick="login()">Login</button>

    <div class="loader" id="loader"></div>
    <div id="status" class="status"></div>

    <div class="link">
      No account?
      <span onclick="location.href='signup.html'">Create account</span>
    </div>

  </div>

  <script>
    if (localStorage.getItem("token")) {
      window.location.replace("home.html");
    }
    history.pushState(null, null, location.href);

    window.onpopstate = function () {
      history.go(1);
    };
    function togglePassword(id, el) {
      const input = document.getElementById(id);
      if (input.type === "password") {
        input.type = "text";
        el.textContent = "🙈";
      } else {
        input.type = "password";
        el.textContent = "👁️";
      }
    }

    async function login() {

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const loader = document.getElementById('loader');
      const status = document.getElementById('status');

      loader.style.display = "block";
      status.style.display = "none";

      try {
        const res = await fetch('/api/users/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        loader.style.display = "none";
        status.style.display = "block";

        const msg = data.errors || "Something went wrong";
        status.innerText = msg;

        if (data.status) {
          status.className = "status success";
          localStorage.setItem('token', data.token);
          setTimeout(() => location.replace('home.html'), 800);
        } else {
          status.className = "status error";
        }

      } catch {
        loader.style.display = "none";
        status.style.display = "block";
        status.className = "status error";
        status.innerText = "Server error";
      }
    }
  </script>

</body>

</html>
