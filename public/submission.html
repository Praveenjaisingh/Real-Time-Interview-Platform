<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Code Submission Dashboard</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Poppins, sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f172a, #1e293b, #334155);
      color: white;
      padding: 20px;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      margin-bottom: 20px;

      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(15px);
      border-radius: 14px;
    }

    .home-btn {
      text-decoration: none;
      color: white;
      font-size: 14px;
      padding: 8px 12px;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
    }

    .title-bar {
      font-weight: 600;
      font-size: 16px;
      background: linear-gradient(90deg, #60a5fa, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .container {
      max-width: 900px;
      margin: auto;
    }

    .header {
      text-align: center;
      margin-bottom: 20px;
    }

    .header h1 {
      font-size: 40px;
      background: linear-gradient(to right, #22c55e, #3b82f6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .card {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 20px;
      backdrop-filter: blur(10px);
    }

    input,
    select,
    textarea {
      width: 100%;
      padding: 12px;
      margin-bottom: 10px;
      border: none;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.12);
      color: white;
      outline: none;
    }

    textarea {
      min-height: 180px;
      font-family: monospace;
      resize: none;
    }

    select option {
      background: #0f172a;
      color: white;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 12px;
      font-weight: 600;
      cursor: pointer;
      color: white;
      background: linear-gradient(135deg, #10b981, #059669);
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.03);
    }

    .toast {
      position: fixed;
      bottom: 25px;
      right: 25px;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 14px;
      opacity: 0;
      transform: translateY(20px);
      transition: 0.3s;
      z-index: 9999;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    .toast.success {
      background: rgba(34, 197, 94, 0.15);
      border: 1px solid #22c55e;
    }

    .toast.error {
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid #ef4444;
    }
  </style>
</head>

<body>

  <div class="container">

    <div class="header">
      <h1>Code Submission</h1>
    </div>
    <div class="topbar">
      <a href="home.html" class="home-btn">← Home</a>
      <div class="title-bar">Interview Dashboard</div>
    </div>

    <div class="card">

      <input type="text" id="questionId" placeholder="Question ID">

      <select id="language">
        <option value="javascript">JavaScript</option>
        <option value="python">Python</option>
        <option value="java">Java</option>
        <option value="cpp">C++</option>
      </select>

      <textarea id="code" placeholder="Write your code here..."></textarea>

      <button onclick="submitCode()">Submit Code</button>

    </div>

  </div>

  <div id="toast" class="toast"></div>

  <script>

    const BASE_URL = "/api/submissions";
    function getToken() {
      return localStorage.getItem("token");
    }

    function showToast(message, type = "success") {
      const toast = document.getElementById("toast");

      toast.className = `toast show ${type}`;
      toast.innerText = message;

      setTimeout(() => {
        toast.className = "toast";
      }, 2500);
    }

    async function submitCode() {

      try {

        const payload = {
          questionId: Number(document.getElementById("questionId").value),
          language: document.getElementById("language").value,
          code: document.getElementById("code").value
        };

        const res = await fetch(BASE_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + getToken()
          },
          body: JSON.stringify(payload)
        });

        let data;

        try {
          data = await res.json();
        } catch (e) {
          throw new Error("Server not responding properly (check backend route)");
        }

        if (!res.ok || data.status === false) {
          throw new Error(data.errors?.[0] || "Submission failed");
        }

        showToast("Code submitted successfully", "success");

      } catch (err) {
        showToast(err.message, "error");
      }
    }

  </script>

</body>

</html>
