<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interview Call</title>

  <script src="https://unpkg.com/@daily-co/daily-js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Inter, Poppins, sans-serif;
    }

    html, body {
      height: 100%;
      background: #0f172a;
      color: #fff;
    }

    .topbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 20;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 20px;
      background: rgba(15, 23, 42, 0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .topbar-title {
      font-size: 16px;
      font-weight: 600;
    }

    .home-btn {
      color: #fff;
      text-decoration: none;
      padding: 8px 14px;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.08);
      font-size: 13px;
    }

    .home-btn:hover {
      background: rgba(255, 255, 255, 0.15);
    }

    #call-frame {
      position: fixed;
      top: 54px;
      left: 0;
      right: 0;
      bottom: 0;
      border: none;
    }

    .status {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 14px;
      font-size: 15px;
      color: #cbd5e1;
    }

    .status.hidden {
      display: none;
    }

    .spinner {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: 3px solid rgba(255, 255, 255, 0.15);
      border-top-color: #60a5fa;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .error-box {
      max-width: 420px;
      text-align: center;
      padding: 20px;
      border-radius: 14px;
      background: rgba(239, 68, 68, 0.12);
      border: 1px solid rgba(239, 68, 68, 0.35);
      color: #fecaca;
    }
  </style>
</head>

<body>

  <div class="topbar">
    <div class="topbar-title">Live Interview</div>
    <a href="/room.html" class="home-btn">← Back to rooms</a>
  </div>

  <div id="status" class="status">
    <div class="spinner"></div>
    <div id="status-text">Connecting to the interview room…</div>
  </div>

  <iframe id="call-frame" allow="camera; microphone; fullscreen; display-capture; autoplay"></iframe>

  <script>
    function token() {
      return localStorage.getItem("token");
    }

    function showStatus(text, isError = false) {
      const status = document.getElementById("status");
      const statusText = document.getElementById("status-text");
      status.classList.remove("hidden");

      if (isError) {
        statusText.parentElement.innerHTML = `<div class="error-box">${text}</div>`;
      } else {
        statusText.innerText = text;
      }
    }

    function hideStatus() {
      document.getElementById("status").classList.add("hidden");
    }

    async function init() {

      const params = new URLSearchParams(window.location.search);
      const roomId = params.get("roomId");

      if (!roomId) {
        showStatus("Missing room id in the URL.", true);
        return;
      }

      if (!token()) {
        showStatus("You need to be logged in to join this call.", true);
        return;
      }

      try {
        const res = await fetch(`/api/interviewrooms/${roomId}/join`, {
          method: "POST",
          headers: {
            "Authorization": "Bearer " + token()
          }
        });

        const data = await res.json();

        if (!res.ok || data.status === false) {
          throw new Error(data.errors?.[0] || "Could not join the room");
        }

        const { meetingLink, token: meetingToken } = data.data;

        if (!meetingLink) {
          throw new Error("This room has no video link. Ask the host to recreate it.");
        }

        const frame = document.getElementById("call-frame");

        const callFrame = window.DailyIframe.wrap(frame, {
          showLeaveButton: true,
          showFullscreenButton: true
        });

        callFrame.on("left-meeting", () => {
          window.location.href = "/room.html";
        });

        await callFrame.join({
          url: meetingLink,
          token: meetingToken
        });

        hideStatus();

      } catch (error) {
        showStatus(error.message, true);
      }
    }

    init();
  </script>

</body>

</html>
