<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notification Dashboard</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Poppins, sans-serif;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      margin-bottom: 20px;

      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(15px);
      border-radius: 14px;
    }

    .home-btn {
      text-decoration: none;
      color: white;
      font-size: 14px;
      padding: 8px 12px;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
    }

    .title-bar {
      font-weight: 600;
      font-size: 16px;
      background: linear-gradient(90deg, #60a5fa, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }


    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f172a, #1e293b, #334155);
      color: white;
      padding: 20px;
    }

    .container {
      max-width: 900px;
      margin: auto;
    }

    .header {
      text-align: center;
      margin-bottom: 20px;
    }

    .header h1 {
      font-size: 40px;
      background: linear-gradient(to right, #f97316, #ef4444);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .card {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 15px;
      backdrop-filter: blur(10px);
    }

    .noti {
      background: #020617;
      padding: 12px;
      border-radius: 12px;
      margin-bottom: 10px;
    }

    .noti small {
      color: #94a3b8;
    }

    .actions {
      margin-top: 8px;
      display: flex;
      gap: 10px;
    }

    button {
      padding: 10px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 600;
      color: white;
      transition: 0.2s;
    }

    .btn-load {
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      width: 100%;
      margin-bottom: 10px;
    }

    .btn-read {
      background: linear-gradient(135deg, #10b981, #059669);
      flex: 1;
    }

    .btn-del {
      background: linear-gradient(135deg, #ef4444, #dc2626);
      flex: 1;
    }

    button:hover {
      transform: scale(1.03);
    }

    .toast {
      position: fixed;
      bottom: 25px;
      right: 25px;

      padding: 12px 16px;
      border-radius: 12px;

      opacity: 0;
      transform: translateY(20px);
      transition: 0.3s;

      font-size: 14px;
      z-index: 9999;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    .toast.success {
      background: rgba(34, 197, 94, 0.15);
      border: 1px solid #22c55e;
    }

    .toast.error {
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid #ef4444;
    }
  </style>
</head>

<body>

  <div class="container">

    <div class="header">
      <h1>Notifications</h1>
    </div>
    <div class="topbar">
      <a href="home.html" class="home-btn">← Home</a>
      <div class="title-bar">Interview Dashboard</div>
    </div>


    <div class="card">

      <button class="btn-load" onclick="loadNotifications()">
        Load Notifications
      </button>

      <div id="list"></div>

    </div>

  </div>

  <div id="toast" class="toast"></div>

  <script>

    const BASE_URL = "/api/notifications";

    function getToken() {
      return localStorage.getItem("token");
    }

    function showToast(msg, type = "success") {
      const toast = document.getElementById("toast");

      toast.className = `toast show ${type}`;
      toast.innerText = msg;

      setTimeout(() => {
        toast.className = "toast";
      }, 2500);
    }

    async function loadNotifications() {

      try {

        const res = await fetch(BASE_URL, {
          headers: {
            "Authorization": "Bearer " + getToken()
          }
        });

        const data = await res.json();

        if (!res.ok || data.status === false) {
          throw new Error(data.errors?.[0] || "Failed to load notifications");
        }

        const list = document.getElementById("list");
        list.innerHTML = "";

        if (!data.data || data.data.length === 0) {
          list.innerHTML = `<div class="noti">No notifications</div>`;
          showToast("No notifications", "error");
          return;
        }

        data.data.forEach(n => {

          list.innerHTML += `
        <div class="noti">

          <strong>${n.title || "Notification"}</strong>

          <p>${n.message || ""}</p>

          <small>Status: ${n.isRead ? "Read" : "Unread"}</small>

          <div class="actions">

            <button class="btn-read" onclick="markRead('${n.id}')">
              Mark Read
            </button>

            <button class="btn-del" onclick="deleteNoti('${n.id}')">
              Delete
            </button>

          </div>

        </div>
      `;
        });

        showToast("Loaded notifications", "success");

      } catch (err) {
        showToast(err.message, "error");
      }
    }

    async function markRead(id) {

      try {

        const res = await fetch(`${BASE_URL}/mark-read`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + getToken()
          },
          body: JSON.stringify({ notificationId: id })
        });

        const data = await res.json();

        if (!res.ok || data.status === false) {
          throw new Error(data.errors?.[0] || "Failed to update");
        }

        showToast("Marked as read", "success");

        loadNotifications();

      } catch (err) {
        showToast(err.message, "error");
      }
    }

    async function deleteNoti(id) {

      try {

        const res = await fetch(`${BASE_URL}/${id}`, {
          method: "DELETE",
          headers: {
            "Authorization": "Bearer " + getToken()
          }
        });

        const data = await res.json();

        if (!res.ok || data.status === false) {
          throw new Error(data.errors?.[0] || "Delete failed");
        }

        showToast("Deleted", "success");

        loadNotifications();

      } catch (err) {
        showToast(err.message, "error");
      }
    }

  </script>

</body>

</html>
