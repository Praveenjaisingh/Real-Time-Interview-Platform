<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Feedback Dashboard</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      margin-bottom: 20px;

      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(15px);
      border-radius: 14px;
    }

    .home-btn {
      text-decoration: none;
      color: white;
      font-size: 14px;
      padding: 8px 12px;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
    }

    .title-bar {
      font-weight: 600;
      font-size: 16px;
      background: linear-gradient(90deg, #60a5fa, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    body {
      font-family: "Poppins", sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #0f172a, #1e293b, #334155);
      padding: 20px;
      color: white;
    }

    .container {
      max-width: 1100px;
      margin: auto;
    }

    .header {
      text-align: center;
      margin-bottom: 25px;
    }

    .header h1 {
      font-size: 40px;
      background: linear-gradient(to right, #34d399, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .header p {
      color: #cbd5e1;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }

    .card {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(12px);
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.25);
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    .card h2 {
      margin-bottom: 15px;
      font-size: 20px;
    }

    input,
    textarea {
      width: 100%;
      padding: 12px;
      margin-bottom: 10px;
      border: none;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.12);
      color: white;
      outline: none;
    }

    textarea {
      min-height: 90px;
      resize: none;
    }

    input::placeholder,
    textarea::placeholder {
      color: #cbd5e1;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 12px;
      font-weight: 600;
      cursor: pointer;
      color: white;
      transition: 0.3s;
    }

    .btn-submit {
      background: linear-gradient(135deg, #10b981, #059669);
    }

    .btn-view {
      background: linear-gradient(135deg, #3b82f6, #2563eb);
    }

    .btn-summary {
      background: linear-gradient(135deg, #f59e0b, #ea580c);
    }

    button:hover {
      transform: scale(1.03);
    }

    .result-card {
      margin-top: 15px;
      padding: 15px;
      border-radius: 15px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #e2e8f0;
      line-height: 1.7;
    }

    .toast {
      position: fixed;
      bottom: 25px;
      right: 25px;
      padding: 14px 18px;
      border-radius: 14px;
      color: white;
      font-size: 14px;
      z-index: 9999;

      opacity: 0;
      transform: translateY(20px);
      transition: 0.3s;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    .toast.success {
      background: rgba(34, 197, 94, 0.15);
      border: 1px solid #22c55e;
    }

    .toast.error {
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid #ef4444;
    }
  </style>
</head>

<body>

  <div class="container">

    <div class="header">
      <h1>Feedback Dashboard</h1>
      <p>Manage interview feedback in real-time</p>
    </div>
    <div class="topbar">
      <a href="home.html" class="home-btn">← Home</a>
      <div class="title-bar">Interview Dashboard</div>
    </div>

    <div class="grid">

      <div class="card">

        <h2>Submit Feedback</h2>

        <input type="text" id="interviewId" placeholder="Interview ID">

        <input type="text" id="candidateId" placeholder="Candidate ID">

        <input type="number" id="rating" placeholder="Rating (1-5)">

        <textarea id="comment" placeholder="Comment"></textarea>

        <button class="btn-submit" onclick="submitFeedback()">
          Submit
        </button>

        <div id="submitResult"></div>

      </div>

      <div class="card">

        <h2>Interview Feedback</h2>

        <input type="text" id="getInterviewId" placeholder="Interview ID">

        <button class="btn-view" onclick="getFeedbackByInterview()">
          View Feedback
        </button>

        <div id="viewResult"></div>

      </div>

      <div class="card">

        <h2>Feedback Summary</h2>

        <input type="text" id="userId" placeholder="User ID">

        <button class="btn-summary" onclick="getSummary()">
          Get Summary
        </button>

        <div id="summaryResult"></div>

      </div>

    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script>

    const BASE_URL = "/api/feedbacks";

    function getToken() {
      return localStorage.getItem("token");
    }

    function showToast(message, type = "success") {

      const toast = document.getElementById("toast");

      toast.className = `toast show ${type}`;
      toast.innerText = message;

      setTimeout(() => {
        toast.className = "toast";
      }, 2500);
    }

    async function submitFeedback() {

      try {

        const interviewId = document.getElementById("interviewId").value;
        const candidateId = document.getElementById("candidateId").value;
        const rating = document.getElementById("rating").value;
        const comment = document.getElementById("comment").value;

        if (!interviewId || !rating || !comment) {

          showToast("All fields are required", "error");
          return;
        }

        const res = await fetch(BASE_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + getToken()
          },
          body: JSON.stringify({
            interviewId,
            candidateId,
            rating,
            comment
          })
        });

        const data = await res.json();

        if (!res.ok || data.status === false) {

          showToast(data.errors?.[0] || "Submit failed", "error");
          return;
        }

        document.getElementById("submitResult").innerHTML = `
      <div class="result-card">

        <strong>Feedback Submitted Successfully</strong>
        <br><br>

        <strong>Interview ID:</strong>
        ${data.data.interviewId}
        <br>

        <strong>Candidate ID:</strong>
        ${data.data.candidateId}
        <br>

        <strong>Rating:</strong>
        ${data.data.rating}
        <br>

        <strong>Comment:</strong>
        ${data.data.comments}

      </div>
    `;

        showToast(data.message || "Feedback submitted", "success");

      } catch (err) {

        console.log(err);

        showToast("Server error", "error");
      }
    }

    async function getFeedbackByInterview() {

      try {

        const id = document.getElementById("getInterviewId").value;

        if (!id) {

          showToast("Interview ID required", "error");
          return;
        }

        const res = await fetch(`${BASE_URL}/${id}`, {
          headers: {
            "Authorization": "Bearer " + getToken()
          }
        });

        const data = await res.json();

        if (!res.ok || data.status === false) {

          showToast(data.errors?.[0] || "Failed to fetch", "error");
          return;
        }

        const feedbacks = data.data || [];

        if (feedbacks.length === 0) {

          document.getElementById("viewResult").innerHTML = `
        <div class="result-card">
          No feedback found
        </div>
      `;

          showToast("No feedback found", "error");
          return;
        }

        document.getElementById("viewResult").innerHTML =
          feedbacks.map(item => `
        <div class="result-card">

          <strong>Interview ID:</strong>
          ${item.interviewId}
          <br>

          <strong>Interviewer ID:</strong>
          ${item.interviewerId}
          <br>

          <strong>Candidate ID:</strong>
          ${item.candidateId}
          <br>

          <strong>Rating:</strong>
          ${item.rating}
          <br>

          <strong>Comment:</strong>
          ${item.comments}

        </div>
      `).join("");

        showToast("Feedback loaded", "success");

      } catch (err) {

        console.log(err);

        showToast("Server error", "error");
      }
    }

    async function getSummary() {

      try {

        const id = document.getElementById("userId").value;

        if (!id) {

          showToast("User ID required", "error");
          return;
        }

        const res = await fetch(`${BASE_URL}/summary/${id}`, {
          headers: {
            "Authorization": "Bearer " + getToken()
          }
        });

        const data = await res.json();

        if (!res.ok || data.status === false) {

          showToast(data.errors?.[0] || "Failed to load summary", "error");
          return;
        }

        document.getElementById("summaryResult").innerHTML = `
      <div class="result-card">

        <strong>Total Feedbacks:</strong>
        ${data.data.totalFeedbacks}
        <br><br>

        <strong>Average Rating:</strong>
        ${data.data.averageRating}

      </div>
    `;

        showToast("Summary loaded", "success");

      } catch (err) {

        console.log(err);

        showToast("Server error", "error");
      }
    }

  </script>

</body>

</html>
