<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interview Room Dashboard</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Poppins, sans-serif;
    }

    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, #1e3a8a33, transparent 30%),
        radial-gradient(circle at bottom right, #7c3aed33, transparent 30%),
        linear-gradient(135deg, #0f172a, #1e293b, #334155);
      color: white;
      padding: 24px;
    }

    .container {
      max-width: 1200px;
      margin: auto;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 50;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 22px;
      margin-bottom: 28px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 18px;
      backdrop-filter: blur(18px);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
    }

    .topbar-title {
      font-size: 20px;
      font-weight: 700;
    }

    .home-btn {
      color: white;
      text-decoration: none;
      padding: 10px 16px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.08);
      transition: .2s ease;
    }

    .home-btn:hover {
      background: rgba(255, 255, 255, 0.15);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
      gap: 24px;
    }

    .card {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 22px;
      padding: 22px;
      backdrop-filter: blur(18px);
      transition: .25s ease;
      box-shadow: 0 10px 30px rgba(0, 0, 0, .18);
    }

    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 18px 40px rgba(0, 0, 0, .28);
    }

    .card h3 {
      margin-bottom: 18px;
      font-size: 22px;
      font-weight: 700;
    }

    input {
      width: 100%;
      padding: 14px;
      border-radius: 14px;
      border: 1px solid transparent;
      outline: none;
      background: rgba(255, 255, 255, 0.09);
      color: white;
      transition: .2s ease;
    }

    input:focus {
      border-color: #60a5fa;
      background: rgba(255, 255, 255, 0.12);
    }

    input::placeholder {
      color: #94a3b8;
    }

    button {
      width: 100%;
      margin-top: 14px;
      padding: 14px;
      border: none;
      border-radius: 14px;
      font-weight: 700;
      font-size: 15px;
      color: white;
      cursor: pointer;
      transition: .25s ease;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      box-shadow: 0 10px 25px rgba(59, 130, 246, .35);
    }

    button:hover {
      transform: translateY(-2px);
      opacity: .95;
    }

    button:active {
      transform: scale(.98);
    }

    .room-card {
      margin-top: 16px;
      padding: 18px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      animation: fadeIn .25s ease;
    }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .title {
      font-size: 20px;
      font-weight: 700;
    }

    .badge {
      font-size: 11px;
      padding: 6px 10px;
      border-radius: 999px;
      font-weight: 700;
      text-transform: uppercase;
    }

    .badge.active {
      color: #60a5fa;
      border: 1px solid #3b82f6;
      background: rgba(59, 130, 246, .12);
    }

    .badge.ended {
      color: #ef4444;
      border: 1px solid #ef4444;
      background: rgba(239, 68, 68, .12);
    }

    .desc {
      margin-top: 10px;
      font-size: 14px;
      color: #cbd5e1;
    }

    .meta {
      margin-top: 14px;
      font-size: 12px;
      color: #94a3b8;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .room-id {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    code {
      color: #22c55e;
      font-size: 12px;
      word-break: break-all;
    }

    .copy-btn {
      padding: 6px 10px;
      font-size: 11px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      background: #2563eb;
      color: white;
      width: auto;
      margin: 0;
    }

    .success-card,
    .danger-card {
      margin-top: 16px;
      padding: 24px 18px;
      text-align: center;
      border-radius: 18px;
      animation: fadeIn .25s ease;
    }

    .success-card {
      background: linear-gradient(135deg,
          rgba(34, 197, 94, .15),
          rgba(16, 185, 129, .08));
      border: 1px solid rgba(34, 197, 94, .35);
    }

    .danger-card {
      background: linear-gradient(135deg,
          rgba(239, 68, 68, .15),
          rgba(220, 38, 38, .08));
      border: 1px solid rgba(239, 68, 68, .35);
    }

    .success-icon {
      width: 58px;
      height: 58px;
      margin: auto;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      font-weight: bold;
      color: white;
      margin-bottom: 16px;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      box-shadow: 0 12px 30px rgba(59, 130, 246, .35);
    }

    .toast {
      position: fixed;
      top: 20px;
      right: 5px;

      background: rgba(34, 197, 94, 0.95);
      color: white;

      padding: 14px 20px;
      border-radius: 12px;

      font-size: 14px;
      font-weight: 600;

      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);

      transform: translateX(120%);
      transition: 0.4s ease;

      z-index: 9999;
    }

    .toast.show {
      transform: translateX(0);
    }

    .toast.error {
      background: rgba(239, 68, 68, 0.95);
    }

    @media(max-width:768px) {

      .toast {
        top: 15px;
        right: 15px;
        left: 15px;

        width: auto;
        text-align: center;
      }

    }

    .success-title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .success-sub {
      font-size: 12px;
      color: #cbd5e1;
      word-break: break-all;
    }

    .participant-card {
      margin-top: 14px;
      padding: 16px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .participant-name {
      font-weight: 700;
      font-size: 16px;
    }

    .participant-email {
      margin-top: 6px;
      color: #cbd5e1;
      font-size: 13px;
    }

    .error-box {
      margin-top: 14px;
      padding: 14px;
      border-radius: 14px;
      background: rgba(239, 68, 68, .12);
      border: 1px solid rgba(239, 68, 68, .35);
      color: #fecaca;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px) scale(.98);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }
  </style>
</head>

<body>
  <div id="toast" class="toast"></div>

  <div class="container">

    <div class="topbar">
      <a class="home-btn" href="home.html">← Home</a>
      <div class="topbar-title">Interview Room Dashboard</div>
    </div>

    <div class="grid">

      <div class="card">
        <h3>Create Room</h3>
        <input id="interviewId" placeholder="Interview ID">
        <button onclick="createRoom()">Create Room</button>
        <div id="createRes"></div>
      </div>

      <div class="card">
        <h3>Join Room</h3>
        <input id="joinRoomId" placeholder="Room ID">
        <button onclick="joinRoom()">Join Room</button>
        <div id="joinRes"></div>
      </div>

      <div class="card">
        <h3>Leave Room</h3>
        <input id="leaveRoomId" placeholder="Room ID">
        <button onclick="leaveRoom()">Leave Room</button>
        <div id="leaveRes"></div>
      </div>

      <div class="card">
        <h3>End Room</h3>
        <input id="endRoomId" placeholder="Room ID">
        <button onclick="endRoom()">End Room</button>
        <div id="endRes"></div>
      </div>

      <div class="card">
        <h3>Participants</h3>
        <input id="partRoomId" placeholder="Room ID">
        <button onclick="getParticipants()">View Participants</button>
        <div id="partRes"></div>
      </div>

    </div>
  </div>

  <script>

    const BASE_URL = "/api/interviewrooms";

    function token() {
      return localStorage.getItem("token");
    }

    async function copyRoomId(id) {

      try {

        await navigator.clipboard.writeText(id);

        showToast("Room ID copied successfully");

      } catch (error) {

        showToast("Failed to copy Room ID", "error");
      }
    }
    function showToast(message, type = "success") {

      const toast = document.getElementById("toast");

      toast.innerText = message;

      toast.className = "toast show";

      if (type === "error") {
        toast.classList.add("error");
      }

      setTimeout(() => {
        toast.classList.remove("show");
      }, 2500);
    }

    async function handle(res) {
      const data = await res.json();

      if (!res.ok || data.status === false) {
        throw new Error(data.errors?.[0] || "Something went wrong");
      }

      return data;
    }

    function renderRoom(item) {

      if (!item) return "";

      return `
    <div class="room-card">

      <div class="row">
        <div class="title">Room #${item.id}</div>

        <div class="badge ${item.status || 'active'}">
          ${item.status || 'active'}
        </div>
      </div>

      <div class="desc">
        Interview ID: ${item.interviewId ?? "-"}
      </div>

      <div class="meta">

        <div class="room-id">
          <code>${item.roomId}</code>

          <button
            class="copy-btn"
            onclick="copyRoomId('${item.roomId}')"
          >
            Copy
          </button>
        </div>

        <span>
          ${item.createdAt
          ? new Date(item.createdAt).toLocaleString()
          : ""}
        </span>

      </div>

    </div>
  `;
    }

    function renderError(message) {
      return `
    <div class="error-box">
      ${message}
    </div>
  `;
    }

    async function createRoom() {

      try {

        const res = await fetch(BASE_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + token()
          },
          body: JSON.stringify({
            interviewId: interviewId.value
          })
        });

        const data = await handle(res);
        createRes.innerHTML = renderRoom(data.data);

      } catch (e) {

        createRes.innerHTML = renderError(e.message);
      }
    }

    async function joinRoom() {

      try {

        const res = await fetch(
          `${BASE_URL}/${joinRoomId.value}/join`,
          {
            method: "POST",
            headers: {
              "Authorization": "Bearer " + token()
            }
          }
        );

        const data = await handle(res);

        joinRes.innerHTML = renderRoom(data.data);

      } catch (e) {

        joinRes.innerHTML = renderError(e.message);
      }
    }

    async function leaveRoom() {

      try {

        const res = await fetch(
          `${BASE_URL}/${leaveRoomId.value}/leave`,
          {
            method: "POST",
            headers: {
              "Authorization": "Bearer " + token()
            }
          }
        );

        await handle(res);

        leaveRes.innerHTML = `
      <div class="success-card">

        <div class="success-icon">✓</div>

        <div class="success-title">
          Left Room Successfully
        </div>

        <div class="success-sub">
          ${leaveRoomId.value}
        </div>

      </div>
    `;

      } catch (e) {

        leaveRes.innerHTML = renderError(e.message);
      }
    }

    async function endRoom() {

      try {

        const res = await fetch(
          `${BASE_URL}/${endRoomId.value}/end`,
          {
            method: "POST",
            headers: {
              "Authorization": "Bearer " + token()
            }
          }
        );

        await handle(res);

        endRes.innerHTML = `
      <div class="danger-card">

        <div class="success-icon">⨉</div>

        <div class="success-title">
          Room Ended
        </div>

        <div class="success-sub">
          ${endRoomId.value}
        </div>

      </div>
    `;

      } catch (e) {

        endRes.innerHTML = renderError(e.message);
      }
    }

    async function getParticipants() {

      try {

        const res = await fetch(
          `${BASE_URL}/${partRoomId.value}/participants`,
          {
            headers: {
              "Authorization": "Bearer " + token()
            }
          }
        );

        const data = await handle(res);

        if (!data.data.length) {

          partRes.innerHTML = `
        <div class="error-box">
          No participants found
        </div>
      `;

          return;
        }

        partRes.innerHTML = data.data.map(p => `
      <div class="participant-card">

        <div class="participant-name">
          ${p.user?.name || "User"}
        </div>

        <div class="participant-email">
          ${p.user?.email || ""}
        </div>

      </div>
    `).join("");

      } catch (e) {

        partRes.innerHTML = renderError(e.message);
      }
    }

  </script>

</body>

</html>
