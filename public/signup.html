<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signup</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
  box-sizing: border-box;
  font-family: Poppins, sans-serif;
  margin: 0;
  padding: 0;
}

body {
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 15px;

  background: radial-gradient(circle at top right, #0f172a, #020617);
  overflow: hidden;
}

body::before,
body::after {
  content: "";
  position: absolute;
  width: 320px;
  height: 320px;
  filter: blur(120px);
  z-index: 0;
}

body::before {
  background: #a855f7;
  top: -80px;
  left: -80px;
}

body::after {
  background: #22c55e;
  bottom: -80px;
  right: -80px;
}

.container {
  position: relative;
  z-index: 1;

  width: 100%;
  max-width: 400px;

  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(25px);

  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 22px;

  padding: 35px;

  box-shadow: 0 25px 60px rgba(0,0,0,0.5);
}

h2 {
  text-align: center;
  margin-bottom: 20px;

  font-size: 28px;

  background: linear-gradient(to right, #34d399, #60a5fa);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

input {
  width: 100%;
  padding: 14px;
  margin: 10px 0;

  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.12);

  background: rgba(255,255,255,0.08);
  color: white;

  outline: none;
}

input::placeholder {
  color: rgba(255,255,255,0.6);
}

input:focus {
  border-color: #34d399;
  box-shadow: 0 0 0 3px rgba(52,211,153,0.2);
  transform: scale(1.02);
}

button {
  width: 100%;
  padding: 14px;
  margin-top: 12px;

  border: none;
  border-radius: 12px;

  background: linear-gradient(135deg, #10b981, #3b82f6);

  color: white;
  font-weight: 600;
  cursor: pointer;
}

button:hover {
  transform: translateY(-3px);
}

.status {
  margin-top: 15px;
  padding: 10px;
  border-radius: 10px;
  display: none;
  text-align: center;
}

.success {
  background: rgba(34,197,94,0.2);
  border: 1px solid #22c55e;
  color: #22c55e;
}

.error {
  background: rgba(239,68,68,0.2);
  border: 1px solid #ef4444;
  color: #ef4444;
}

.loader {
  display: none;
  margin: 15px auto 0;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  border: 3px solid rgba(255,255,255,0.2);
  border-top: 3px solid white;
  animation: spin 0.8s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.link {
  text-align: center;
  margin-top: 15px;
  color: rgba(255,255,255,0.8);
}

.link span {
  color: white;
  font-weight: 600;
  cursor: pointer;
}

.password-wrapper {
  position: relative;
}

.toggle-eye {
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  cursor: pointer;
}
</style>
</head>

<body>

<div class="container">

<h2>Create Account</h2>

<input id="name" placeholder="Full name">
<input id="email" placeholder="Email">

<div class="password-wrapper">
  <input id="password" type="password" placeholder="Password">
  <span class="toggle-eye" onclick="togglePassword('password', this)">👁️</span>
</div>

<div class="password-wrapper">
  <input id="confirmPassword" type="password" placeholder="Confirm Password">
  <span class="toggle-eye" onclick="togglePassword('confirmPassword', this)">👁️</span>
</div>

<button onclick="signup()">Create Account</button>

<div class="loader" id="loader"></div>
<div id="status" class="status"></div>

<div class="link">
  Already have account?
  <span onclick="location.href='login.html'">Login</span>
</div>

</div>

<script>
function togglePassword(id, el){
  const input = document.getElementById(id);
  input.type = input.type === "password" ? "text" : "password";
  el.textContent = input.type === "password" ? "👁️" : "🙈";
}

async function signup(){

  const name = document.getElementById('name').value;
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  const confirmPassword = document.getElementById('confirmPassword').value;

  const loader = document.getElementById('loader');
  const status = document.getElementById('status');

  status.style.display = "none";

  // validation
  if(!name || !email || !password || !confirmPassword){
    status.style.display = "block";
    status.className = "status error";
    status.innerText = "All fields are required";
    return;
  }

  if(password !== confirmPassword){
    status.style.display = "block";
    status.className = "status error";
    status.innerText = "Passwords do not match";
    return;
  }

  loader.style.display = "block";

  try{
    const res = await fetch('/api/users/create',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({ name, email, password })
    });

    const data = await res.json();

    loader.style.display = "none";
    status.style.display = "block";

    status.innerText = data.errors || "Sign-in Success";

    if(data.status){
      status.className = "status success";
      setTimeout(()=>location.replace('login.html'),800);
    }else{
      status.className = "status error";
    }

  }catch{
    loader.style.display = "none";
    status.style.display = "block";
    status.className = "status error";
    status.innerText = "Server error";
  }
}
</script>

</body>
</html>
