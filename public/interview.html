<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interview Dashboard</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Inter, sans-serif;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at top, #0f172a, #020617);
      color: #fff;
      padding: 30px;
    }

    .container {
      max-width: 1200px;
      margin: auto;
    }

    h1 {
      text-align: center;
      font-size: 38px;
      font-weight: 700;
      margin-bottom: 30px;
      background: linear-gradient(90deg, #60a5fa, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      margin-bottom: 20px;

      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(15px);
      border-radius: 14px;
    }

    .home-btn {
      text-decoration: none;
      color: white;
      font-size: 14px;
      padding: 8px 12px;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
    }

    .title-bar {
      font-weight: 600;
      font-size: 16px;
      background: linear-gradient(90deg, #60a5fa, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }


    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 22px;
    }

    .card {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 18px;
      padding: 20px;
    }


    input,
    textarea {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.05);
      color: white;
    }

    textarea {
      min-height: 90px;
      resize: none;
    }

    button {
      width: 100%;
      margin-top: 12px;
      padding: 12px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 600;
      color: white;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
    }

    .list {
      margin-top: 12px;
      display: grid;
      gap: 12px;
    }

    .interview-card {
      padding: 14px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .row {
      display: flex;
      justify-content: space-between;
    }

    .title {
      font-weight: 600;
    }

    .badge {
      font-size: 11px;
      padding: 4px 8px;
      border-radius: 999px;
    }

    .badge.scheduled {
      color: #60a5fa;
      border: 1px solid #3b82f6;
    }

    .badge.completed {
      color: #22c55e;
      border: 1px solid #22c55e;
    }

    .badge.cancelled {
      color: #ef4444;
      border: 1px solid #ef4444;
    }

    .desc {
      margin-top: 6px;
      font-size: 13px;
      color: #cbd5e1;
    }

    .meta {
      margin-top: 8px;
      font-size: 11px;
      color: #94a3b8;
      display: flex;
      justify-content: space-between;
    }

    .toast {
      position: fixed;
      bottom: 25px;
      right: 25px;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 14px;
      z-index: 9999;

      opacity: 0;
      transform: translateY(20px);
      transition: 0.3s;

      color: white;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    .toast.success {
      background: rgba(34, 197, 94, 0.15);
      border: 1px solid #22c55e;
    }

    .toast.error {
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid #ef4444;
    }
  </style>
</head>

<body>

  <div class="topbar">
    <a href="home.html" class="home-btn">← Home</a>
    <div class="title-bar">Interview Dashboard</div>
  </div>

  <div class="container">

    <h1>Interview Dashboard</h1>

    <div class="grid">

      <div class="card">
        <h3>Create Interview</h3>
        <input id="createTitle" placeholder="Title">
        <textarea id="createDescription" placeholder="Description"></textarea>
        <button onclick="createInterview()">Create</button>
      </div>

      <div class="card">
        <h3>All Interviews</h3>
        <button onclick="getInterviews()">Fetch Interviews</button>
        <div id="interviewList" class="list"></div>
      </div>

      <div class="card">
        <h3>Get Interview By ID</h3>
        <input id="getId" placeholder="ID">
        <button onclick="getInterviewById()">Get</button>
        <div id="singleInterview" class="list"></div>
      </div>

      <div class="card">
        <h3>Update Interview</h3>
        <input id="updateId" placeholder="ID">
        <input id="updateTitle" placeholder="Title">
        <textarea id="updateDescription" placeholder="Description"></textarea>
        <button onclick="updateInterview()">Update</button>
        <div id="updateResult" class="list"></div>
      </div>

      <div class="card">
        <h3>Delete Interview</h3>
        <input id="deleteId" placeholder="ID">
        <button onclick="deleteInterview()">Delete</button>
        <div id="deleteResult" class="list"></div>
      </div>

    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script>

    const BASE_URL = "/api/interview";

    function getToken() {
      return localStorage.getItem("token");
    }

    function showToast(message, type = "success") {
      const toast = document.getElementById("toast");
      toast.className = `toast show ${type}`;
      toast.innerText = message;

      setTimeout(() => {
        toast.className = "toast";
      }, 2500);
    }

    async function createInterview() {
      try {
        const res = await fetch(BASE_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + getToken()
          },
          body: JSON.stringify({
            title: createTitle.value,
            description: createDescription.value
          })
        });

        const data = await res.json();

        if (!res.ok || data.status === false) {
          showToast(data.errors?.[0] || "Create failed", "error");
          return;
        }

        showToast("Created successfully", "success");

      } catch (err) {
        showToast("Server error", "error");
      }
    }

    async function getInterviews() {
      try {
        const res = await fetch(BASE_URL, {
          headers: { "Authorization": "Bearer " + getToken() }
        });

        const data = await res.json();

        if (!data.status) {
          showToast(data.errors?.[0] || "Failed to load", "error");
          return;
        }

        interviewList.innerHTML = data.data.map(item => `
      <div class="interview-card">
        <div class="row">
          <div class="title">${item.title}</div>
          <div class="badge ${item.status}">${item.status}</div>
        </div>
        <div class="desc">${item.description}</div>
        <div class="meta">
          <span>ID: ${item.id}</span>
          <span>${new Date(item.createdAt).toLocaleDateString()}</span>
        </div>
      </div>
    `).join("");

        showToast("Loaded", "success");

      } catch (err) {
        showToast("Server error", "error");
      }
    }

    async function getInterviewById() {
      try {
        const id = getId.value.trim();
        if (!id) {
          showToast("Interview ID is required", "error");
          return;
        }

        const res = await fetch(`${BASE_URL}/${id}`, {
          headers: { "Authorization": "Bearer " + getToken() }
        });

        const data = await res.json();

        if (!data.status || !data.data) {
          showToast(data.errors?.[0] || "Not found", "error");
          return;
        }

        const item = data.data;

        singleInterview.innerHTML = `
      <div class="interview-card">
        <div class="row">
          <div class="title">${item.title}</div>
          <div class="badge ${item.status}">${item.status}</div>
        </div>
        <div class="desc">${item.description}</div>
        <div class="meta">
          <span>ID: ${item.id}</span>
          <span>${new Date(item.createdAt).toLocaleString()}</span>
        </div>
      </div>
    `;

        showToast("Loaded", "success");

      } catch (err) {
        showToast("Server error", "error");
      }
    }

    async function updateInterview() {
      try {
        const res = await fetch(`${BASE_URL}/${updateId.value}`, {
          method: "PUT",
          headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + getToken()
          },
          body: JSON.stringify({
            title: updateTitle.value,
            description: updateDescription.value
          })
        });

        const data = await res.json();

        if (!res.ok || data.status === false) {
          showToast(data.errors?.[0] || "Update failed", "error");
          return;
        }

        updateResult.innerHTML = `<div class="interview-card">Updated Successfully</div>`;
        showToast("Updated", "success");

      } catch (err) {
        showToast("Server error", "error");
      }
    }

    async function deleteInterview() {
      try {
        const res = await fetch(`${BASE_URL}/${deleteId.value}`, {
          method: "DELETE",
          headers: {
            "Authorization": "Bearer " + getToken()
          }
        });

        const data = await res.json();

        if (!res.ok || data.status === false) {
          showToast(data.errors?.[0] || "Delete failed", "error");
          return;
        }

        deleteResult.innerHTML = `<div class="interview-card">Deleted Successfully</div>`;
        showToast("Deleted", "success");

      } catch (err) {
        showToast("Server error", "error");
      }
    }

  </script>

</body>

</html>
