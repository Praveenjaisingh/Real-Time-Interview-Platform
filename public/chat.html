<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interview Chat</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .topbar {
            position: sticky;
            top: 0;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 18px;
            margin-bottom: 20px;

            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border-radius: 14px;
        }

        .home-btn {
            text-decoration: none;
            color: white;
            font-size: 14px;
            padding: 8px 12px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .title-bar {
            font-weight: 600;
            font-size: 16px;
            background: linear-gradient(90deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        body {
            font-family: "Poppins", sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f172a, #1e293b, #334155);
            color: white;
            padding: 16px;
        }

        .container {
            max-width: 1000px;
            margin: auto;
        }

        .header {
            text-align: center;
            margin-bottom: 18px;
        }

        .header h1 {
            font-size: 34px;
            background: linear-gradient(to right, #60a5fa, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-top: 16px;
        }

        .card {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 14px;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            background: rgba(255, 255, 255, 0.12);
            color: white;
            margin-bottom: 10px;
            outline: none;
        }

        input::placeholder {
            color: #cbd5e1;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            color: white;
        }

        button:hover {
            transform: scale(1.02);
        }

        .btn-send {
            background: linear-gradient(135deg, #10b981, #059669);
        }

        .btn-load {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            margin-top: 10px;
        }

        .chat-box {
            height: 420px;
            overflow-y: auto;
            padding: 10px;
            background: #020617;
            border-radius: 12px;
        }

        .msg {
            background: #1e293b;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 10px;
            position: relative;
        }

        .msg strong {
            color: #38bdf8;
        }

        .msg small {
            display: block;
            font-size: 11px;
            color: #94a3b8;
            margin-top: 5px;
        }

        .delete-btn {
            position: absolute;
            right: 10px;
            top: 8px;
            background: #ef4444;
            padding: 3px 7px;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            .grid {
                grid-template-columns: 1fr;
            }

            .chat-box {
                height: 320px;
            }
        }

        .toast {
            position: fixed;
            bottom: 25px;
            right: 25px;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            z-index: 9999;
            opacity: 0;
            transform: translateY(20px);
            transition: 0.3s;
            color: white;
        }

        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }

        .toast.success {
            background: rgba(34, 197, 94, 0.15);
            border: 1px solid #22c55e;
        }

        .toast.error {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid #ef4444;
        }
    </style>
</head>

<body>

    <div class="topbar">
        <a href="home.html" class="home-btn">← Home</a>
        <div class="title-bar">Interview Dashboard</div>
    </div>

    <div class="container">

        <div class="header">
            <h1>Interview Chat</h1>
        </div>

        <div class="grid">

            <div class="card">
                <input type="text" id="interviewId" placeholder="Enter Interview ID" />
                <div class="chat-box" id="chatBox"></div>
                <button class="btn-load" onclick="loadMessages()">Load Messages</button>
            </div>

            <div class="card">
                <input type="text" id="message" placeholder="Type your message..." />
                <button class="btn-send" onclick="sendMessage()">Send Message</button>
            </div>

        </div>

    </div>

    <div id="toast" class="toast"></div>

    <script>

        const BASE_URL = "/api/chats";

        function getToken() {
            return localStorage.getItem("token");
        }

        function showToast(message, type = "success") {
            const toast = document.getElementById("toast");

            toast.innerText = message;
            toast.className = `toast show ${type}`;

            setTimeout(() => {
                toast.className = "toast";
            }, 2500);
        }

        function scrollBottom() {
            const box = document.getElementById("chatBox");
            box.scrollTop = box.scrollHeight;
        }

        async function loadMessages() {
            const interviewId = document.getElementById("interviewId").value.trim();

            if (!interviewId) {
                return showToast("Enter Interview ID", "error");
            }

            try {
                const res = await fetch(`${BASE_URL}/${interviewId}`, {
                    headers: { "Authorization": "Bearer " + getToken() }
                });

                const result = await res.json();
                const messages = result.data || [];

                const box = document.getElementById("chatBox");
                box.innerHTML = "";

                messages.forEach(msg => {
                    box.innerHTML += `
                <div class="msg">
                    <strong>User #${msg.senderId}</strong>
                    <p>${msg.message}</p>
                    <small>${new Date(msg.createdAt).toLocaleString()}</small>
                    <span class="delete-btn" onclick="deleteMessage(${msg.id})">X</span>
                </div>
            `;
                });

                scrollBottom();
                showToast("Messages loaded", "success");

            } catch (err) {
                showToast("Failed to load messages", "error");
            }
        }

        async function sendMessage() {
            const interviewId = document.getElementById("interviewId").value.trim();
            const message = document.getElementById("message").value.trim();

            if (!interviewId || !message) {
                return showToast("Interview ID and message required", "error");
            }

            try {
                await fetch(`${BASE_URL}/send`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": "Bearer " + getToken()
                    },
                    body: JSON.stringify({
                        interviewId: Number(interviewId),
                        message
                    })
                });

                document.getElementById("message").value = "";
                loadMessages();
                showToast("Message sent", "success");

            } catch (err) {
                showToast("Failed to send message", "error");
            }
        }

        async function deleteMessage(id) {
            try {
                await fetch(`${BASE_URL}/${id}`, {
                    method: "DELETE",
                    headers: { "Authorization": "Bearer " + getToken() }
                });

                loadMessages();
                showToast("Message deleted", "success");

            } catch (err) {
                showToast("Delete failed", "error");
            }
        }

    </script>

</body>

</html>
